# Build the whole image on GitHub (frontend + backend → one embedded binary) and
# push it to the GitHub Container Registry (GHCR). No local toolchain needed.
name: docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request: # build only (no push) to catch breakage early
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR via the built-in GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - name: Git info (baked into the binary)
        id: git
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "msg=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            GIT_SHA=${{ steps.git.outputs.sha }}
            GIT_MSG=${{ steps.git.outputs.msg }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Desktop apps (macOS + Windows) — built on their NATIVE runners (no Tauri
  # cross-compilation). Runs AFTER the backend image so it never slows that build;
  # skipped on PRs. Installers are uploaded as artifacts (signing comes later).
  desktop:
    needs: build-and-push
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Build web bundle (embedded fallback for the shell)
        run: cd frontend && bun install --frozen-lockfile && bun run build

      - name: Tauri deps + icons
        run: cd app && bun install && bun run tauri icon app-icon.png

      - name: Build desktop app
        run: cd app && bun run tauri build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: zenithar-desktop-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            app/src-tauri/target/release/bundle/dmg/*.dmg
            app/src-tauri/target/release/bundle/macos/*.app
            app/src-tauri/target/release/bundle/nsis/*.exe
            app/src-tauri/target/release/bundle/msi/*.msi
