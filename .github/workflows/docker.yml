# Build the whole image on GitHub (frontend + backend → one embedded binary) and
# push it to the GitHub Container Registry (GHCR). No local toolchain needed.
name: docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request: # build only (no push) to catch breakage early
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR via the built-in GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v5

      - name: Git info (baked into the binary)
        id: git
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "msg=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false # skip the `*.dockerbuild` provenance artifact
        with:
          context: .
          build-args: |
            GIT_SHA=${{ steps.git.outputs.sha }}
            GIT_MSG=${{ steps.git.outputs.msg }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # WebM->WebP transcoder sidecar image (python-slim + ffmpeg). Pushed to GHCR as
  # <repo>-transcoder so the deploy compose can PULL it (no local build). Gated on
  # `changes` so it only (re)builds when transcoder/ (or this workflow) changed —
  # a backend/frontend-only push leaves the existing :latest image untouched.
  transcoder-image:
    needs: changes
    if: >-
      needs.changes.outputs.transcoder == 'true' ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-transcoder
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: ./transcoder
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Which parts changed? The native apps (desktop/android) bundle only app/ (the
  # Tauri shell + the static app/landing) and load the real UI from the server at
  # runtime — they do NOT embed the backend or the main frontend (frontendDist is
  # ../landing). So a backend- or frontend-only push shouldn't rebuild them. This
  # gates the native jobs on app/** (+ this workflow), so they skip otherwise.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      native: ${{ steps.filter.outputs.native }}
      transcoder: ${{ steps.filter.outputs.transcoder }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            native:
              - 'app/**'
              - '.github/workflows/docker.yml'
            transcoder:
              - 'transcoder/**'
              - '.github/workflows/docker.yml'

  # Desktop apps — built on their NATIVE runners (no Tauri cross-compilation).
  # Runs AFTER the backend image so it never slows that build; skipped on PRs.
  # macOS is OFF here on purpose: GitHub bills macOS runners at 10× minutes, and
  # we build the Mac app locally (`make app-mac`). Add `macos-latest` back to the
  # matrix to re-enable it. Installers are uploaded as artifacts (signing later).
  desktop:
    needs: [build-and-push, changes]
    if: >-
      github.event_name != 'pull_request' &&
      (needs.changes.outputs.native == 'true' ||
       startsWith(github.ref, 'refs/tags/v') ||
       github.event_name == 'workflow_dispatch')
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Build web bundle (embedded fallback for the shell)
        run: cd frontend && bun install --frozen-lockfile && bun run build

      - name: Tauri deps + icons
        run: cd app && bun install && bun run tauri icon app-icon.png

      - name: Build desktop app
        run: cd app && bun run tauri build

      - name: Upload installers
        uses: actions/upload-artifact@v5
        with:
          name: zenithar-desktop-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            app/src-tauri/target/release/bundle/dmg/*.dmg
            app/src-tauri/target/release/bundle/macos/*.app
            app/src-tauri/target/release/bundle/nsis/*.exe
            app/src-tauri/target/release/bundle/msi/*.msi

  # Android — built on Linux (Gradle needs Java 17; Android SDK/NDK come with the
  # runner). Runs after the backend image too. Produces a DEBUG-signed .apk that
  # sideloads immediately; a Play-Store .aab needs a release keystore (later).
  android:
    needs: [build-and-push, changes]
    if: >-
      github.event_name != 'pull_request' &&
      (needs.changes.outputs.native == 'true' ||
       startsWith(github.ref, 'refs/tags/v') ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "27.2.12479018"
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Build web bundle
        run: cd frontend && bun install --frozen-lockfile && bun run build

      - name: Tauri deps + icons
        run: cd app && bun install && bun run tauri icon app-icon.png

      - name: Install Android platform 36 + NDK
        run: yes | sdkmanager "platforms;android-36" "ndk;$NDK_VERSION"

      - name: Build Android APK
        env:
          # Set these 4 repo secrets to get a small, signed RELEASE build that
          # installs. Without them we fall back to a (debug-signed) build so CI
          # never breaks. Keep the SAME keystore across builds or Android treats
          # an update as a different app.
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          # Firebase client config (base64 of app/platforms/android/google-services.json).
          # It's git-ignored, so CI restores it from this secret before patch.sh
          # picks it up and wires FCM. Absent → build still works, just no push.
          GS_B64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          # NDK_HOME from the shell ($ANDROID_HOME is set by setup-android); the
          # GitHub `env.*` expression context does NOT see the runner's preset
          # ANDROID_NDK_* vars, which is why a previous attempt got an empty path.
          export NDK_HOME="$ANDROID_HOME/ndk/$NDK_VERSION"
          cd app
          bun run tauri android init
          # Android launcher icons: `android init` regenerated gen/android with the
          # DEFAULT Tauri icons, so (re)generate ours into it NOW — the earlier
          # `tauri icon` (pre-init) only did the desktop set.
          bun run tauri icon app-icon.png
          # compile/targetSdk live in the generated Gradle (minSdk comes from
          # tauri.conf). Pin them to 36 (Play's target from 2026-08-31); tolerant
          # if the template's syntax differs.
          perl -pi -e 's/compileSdk\s*=\s*\d+/compileSdk = 36/; s/targetSdk\s*=\s*\d+/targetSdk = 36/' \
            src-tauri/gen/android/app/build.gradle.kts || true
          # Restore the Firebase client config (git-ignored) so patch.sh wires FCM.
          if [ -n "$GS_B64" ]; then
            echo "→ FCM: restoring google-services.json from secret"
            echo "$GS_B64" | base64 -d > platforms/android/google-services.json
          else
            echo "→ FCM: no GOOGLE_SERVICES_JSON_BASE64 secret → push disabled in this build"
          fi
          # Deep-link intent-filter + cold-start launch-intent forward (+ FCM if json present).
          bash platforms/android/patch.sh
          OUT=src-tauri/gen/android/app/build/outputs/apk
          if [ -n "$KS_B64" ]; then
            echo "→ signed RELEASE build (optimized, small)"
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/zenithar.jks"
            RUSTFLAGS="-C strip=symbols" bun run tauri android build --apk --split-per-abi
            APKSIGNER=$(ls -d "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -1)
            for apk in "$OUT"/*/release/*-unsigned.apk; do
              "$APKSIGNER" sign --ks "$RUNNER_TEMP/zenithar.jks" --ks-pass "pass:$KS_PASS" \
                --ks-key-alias "$KEY_ALIAS" --key-pass "pass:$KEY_PASS" \
                --out "${apk%-unsigned.apk}.apk" "$apk"
              rm -f "$apk"
            done
          else
            echo "→ no keystore secret → DEBUG build (installs without a keystore)"
            # --split-per-abi: one APK per arch (install arm64-v8a) instead of a
            # fat universal; strip=debuginfo drops the DWARF bulk from the .so's.
            RUSTFLAGS="-C strip=debuginfo" bun run tauri android build --apk --debug --split-per-abi
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: zenithar-android
          if-no-files-found: warn
          path: app/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  # Rolling release: on every push to main, refresh ONE prerelease (tag `latest`)
  # with the newest installers/APK. Filenames are stable, so each push replaces
  # the assets instead of piling up hundreds of releases. Cut a versioned release
  # later by pushing a `vX.Y.Z` tag (would need its own job).
  release:
    needs: [desktop, android]
    # Only when at least one native app actually built (skipped on backend-only
    # pushes). !cancelled() lets this evaluate even though needs may be skipped.
    if: >-
      !cancelled() && github.ref == 'refs/heads/main' &&
      (needs.desktop.result == 'success' || needs.android.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/update the Release
    steps:
      - name: Collect build artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          # Only our installers/APK — NOT the `*.dockerbuild` provenance artifact
          # that build-push-action auto-uploads (downloading it was failing).
          pattern: zenithar-*

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build (dev)
          prerelease: true
          body: Rolling build from `main` — commit ${{ github.sha }}.
          files: |
            dist/**/*.exe
            dist/**/*.msi
            dist/**/*.dmg
            dist/**/*.apk
