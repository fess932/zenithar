<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Zenithar">
  <title>Zenithar</title>
  <defs>
    <radialGradient id="fbg" cx="50%" cy="78%" r="95%">
      <stop offset="0%" stop-color="#20262f"/>
      <stop offset="60%" stop-color="#1a1f29"/>
      <stop offset="100%" stop-color="#11141b"/>
    </radialGradient>
    <linearGradient id="fstar" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#ffd574"/>
      <stop offset="50%" stop-color="#e8b04b"/>
      <stop offset="100%" stop-color="#6fb3c9"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#fbg)"/>

  <!-- compact, chunky four-point beacon — survives 16px tabs -->
  <path fill="url(#fstar)"
    d="M32 7
       Q37 27 57 32
       Q37 37 32 57
       Q27 37 7 32
       Q27 27 32 7 Z"/>
  <circle cx="32" cy="32" r="5.5" fill="#fff6e0">
    <animate attributeName="r" values="4.5;7;4.5" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
