<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Zenithar">
  <title>Zenithar</title>
  <defs>
    <!-- deep slate, lit from below so the beacon reads as backlit -->
    <radialGradient id="bg" cx="50%" cy="78%" r="95%">
      <stop offset="0%" stop-color="#20262f"/>
      <stop offset="55%" stop-color="#1a1f29"/>
      <stop offset="100%" stop-color="#11141b"/>
    </radialGradient>
    <!-- beacon gold bleeding into the cool "you" cyan -->
    <linearGradient id="star" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#fff0cf"/>
      <stop offset="30%" stop-color="#ffd574"/>
      <stop offset="58%" stop-color="#e8b04b"/>
      <stop offset="100%" stop-color="#6fb3c9"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="13" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="halo" cx="50%" cy="40%" r="58%">
      <stop offset="0%" stop-color="#e8b04b" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#e8b04b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full-bleed: PWA masks the corners itself (maskable). -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <circle cx="256" cy="252" r="200" fill="url(#halo)">
    <animate attributeName="r" values="190;210;190" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- signal arcs broadcasting from the zenith -->
  <g fill="none" stroke="#3a4250" stroke-width="6" stroke-linecap="round" opacity="0.75">
    <path d="M150 392 A150 150 0 0 1 362 392"/>
    <path d="M112 430 A206 206 0 0 1 400 430"/>
  </g>

  <!-- the beacon: a four-point spark, top ray raked up to the zenith -->
  <g filter="url(#glow)">
    <path fill="url(#star)"
      d="M256 56
         Q272 288 412 300
         Q278 318 256 470
         Q236 318 100 300
         Q244 288 256 56 Z"/>
    <!-- bright core that pulses -->
    <circle cx="256" cy="300" r="26" fill="#fff6e0">
      <animate attributeName="r" values="20;30;20" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.6;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- a cheeky off-axis twinkle -->
  <path fill="#cfeaf2" opacity="0.9"
    d="M372 150 Q380 184 408 190 Q380 196 372 230 Q364 196 336 190 Q364 184 372 150 Z">
    <animate attributeName="opacity" values="0.2;0.95;0.2" dur="3.1s" repeatCount="indefinite"/>
  </path>
</svg>
