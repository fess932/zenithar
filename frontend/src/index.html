<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zenithar — team room</title>
    <style>
      /* Self-hosted tool: no external fonts. Identity comes from scale, weight,
         and a mono "log" voice for metadata — not from a downloaded typeface. */
      :root {
        --ink: #141821;        /* deep slate, not pure black */
        --surface: #1a1f29;
        --surface-2: #20262f;
        --line: #2a313d;
        --text: #e7eaf0;
        --muted: #828d9e;
        --beacon: #e8b04b;     /* warm signal gold */
        --you: #6fb3c9;        /* cool tone marks your own lines */
        --bad: #d9694e;
        --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --row: 1.55rem;
      }

      * { box-sizing: border-box; }

      html, body {
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--ink);
        color: var(--text);
        font-family: var(--sans);
        font-size: 15px;
        line-height: 1.5;
        display: grid;
        grid-template-rows: auto 1fr auto;
        height: 100dvh;
      }

      /* ---- header ---------------------------------------------------------- */
      header {
        display: flex;
        align-items: baseline;
        gap: 0.85rem;
        padding: 0.9rem 1.25rem;
        border-bottom: 1px solid var(--line);
        background: var(--surface);
      }
      .wordmark {
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        font-size: 0.82rem;
      }
      .room {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 0.78rem;
      }
      .beacon {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-family: var(--mono);
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .beacon .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
      }
      .beacon[data-state="live"] { color: var(--beacon); }
      .beacon[data-state="live"] .dot {
        background: var(--beacon);
        box-shadow: 0 0 0 0 rgba(232, 176, 75, 0.55);
        animation: pulse 2.4s ease-out infinite;
      }
      .beacon[data-state="down"] { color: var(--bad); }
      .beacon[data-state="down"] .dot { background: var(--bad); }

      @keyframes pulse {
        0%   { box-shadow: 0 0 0 0 rgba(232, 176, 75, 0.5); }
        70%  { box-shadow: 0 0 0 7px rgba(232, 176, 75, 0); }
        100% { box-shadow: 0 0 0 0 rgba(232, 176, 75, 0); }
      }

      /* ---- transcript ------------------------------------------------------ */
      #log {
        overflow-y: auto;
        padding: 0.75rem 0;
      }
      .empty {
        color: var(--muted);
        padding: 2.5rem 1.5rem;
        font-family: var(--mono);
        font-size: 0.82rem;
      }
      .line {
        display: grid;
        grid-template-columns: 5.5rem 8rem 1fr;
        gap: 0.75rem;
        padding: 0.12rem 1.25rem;
        border-left: 2px solid transparent;
      }
      .line:hover { background: var(--surface); }
      .line .time {
        font-family: var(--mono);
        font-size: 0.74rem;
        color: var(--muted);
        text-align: right;
        padding-top: 0.12rem;
      }
      .line .who {
        font-family: var(--mono);
        font-size: 0.8rem;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .line .body { word-break: break-word; }
      .line.mine { border-left-color: var(--you); }
      .line.mine .who { color: var(--you); }
      .line.arrived { animation: flash 1.1s ease-out; }
      @keyframes flash {
        from { border-left-color: var(--beacon); background: var(--surface-2); }
        to   { border-left-color: transparent; background: transparent; }
      }

      /* ---- composer -------------------------------------------------------- */
      form {
        display: flex;
        gap: 0.6rem;
        padding: 0.85rem 1.25rem;
        border-top: 1px solid var(--line);
        background: var(--surface);
      }
      input, button {
        font: inherit;
        border-radius: 7px;
        border: 1px solid var(--line);
        background: var(--surface-2);
        color: var(--text);
        padding: 0.6rem 0.8rem;
      }
      input:focus-visible, button:focus-visible {
        outline: 2px solid var(--beacon);
        outline-offset: 1px;
      }
      #name { width: 8rem; font-family: var(--mono); font-size: 0.85rem; }
      #body { flex: 1; }
      #body::placeholder { color: var(--muted); }
      button {
        background: var(--beacon);
        color: #1a1206;
        border-color: var(--beacon);
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { filter: brightness(1.06); }

      @media (max-width: 560px) {
        .line { grid-template-columns: 4.5rem 1fr; }
        .line .who { grid-column: 2; color: var(--you); }
        .line .time { grid-row: 1 / 3; }
        #name { display: none; }
      }
      @media (prefers-reduced-motion: reduce) {
        .beacon .dot, .line.arrived { animation: none !important; }
      }
    </style>
  </head>
  <body>
    <header>
      <span class="wordmark">Zenithar</span>
      <span class="room">#team</span>
      <span class="beacon" id="beacon" data-state="connecting">
        <span class="dot"></span><span id="beacon-label">connecting</span>
      </span>
    </header>

    <main id="log" aria-live="polite">
      <p class="empty" id="empty">No signals yet. Say something to the team.</p>
    </main>

    <form id="composer" autocomplete="off">
      <input id="name" placeholder="you" aria-label="Your name" maxlength="40" />
      <input id="body" placeholder="Message the team…" aria-label="Message" maxlength="4000" />
      <button type="submit">Send</button>
    </form>

    <script type="module" src="./main.js"></script>
  </body>
</html>
