[package]
name = "zenithar-backend"
version = "0.1.0"
edition = "2021"
description = "Zenithar — self-hosted corporate messenger backend (Phase 0 skeleton)"
license = "MIT"

[dependencies]
axum = { version = "0.8.9", features = ["ws"] }
axum-extra = { version = "0.10", features = ["cookie"] }
tokio = { version = "1", features = ["full"] }
tower-http = { version = "0.6", features = ["trace", "cors"] }
rust-embed = { version = "8", features = ["mime-guess"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "macros"] }
ulid = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
futures-util = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
getrandom = "0.2"
sha2 = "0.10"
base64 = "0.22"
time = "0.3"

[profile.dev]
# bundled SQLite C compile is the slow part; keep our code fast to iterate
opt-level = 0
