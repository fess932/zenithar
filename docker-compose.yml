services:
  zenithar:
    # Deploy-only: the image is built + pushed by CI (GitHub → GHCR). Pull it,
    # don't build locally:  docker compose up -d --pull always --force-recreate
    image: ghcr.io/fess932/zenithar:latest
    # --- Networking for voice calls --------------------------------------------
    # Call MEDIA is UDP: ONE socket per participant, each bound to 0.0.0.0 on a
    # port from ZENITHAR_UDP_PORTS (so a 1:1 call needs >=2 ports — use a RANGE).
    # With HOST networking those sockets are on the host's real NIC, so the
    # router/DMZ just forwards that whole UDP range to this host. (Bridged
    # alternative: drop `network_mode: host` and publish the range: add a `ports:`
    # block with "3000:3000" and "51000-51200:51000-51200/udp".)
    network_mode: host
    volumes:
      # Persistent data (SQLite DB, attachments, call recordings, bootstrap admin
      # link) lives at an ABSOLUTE host path OUTSIDE the deploy/clone dir, so a
      # redeploy that re-clones the stack folder can't wipe it. Create it once:
      #   sudo mkdir -p /opt/zenithar/data
      # The container runs as root, so it can write here without a manual chown.
      - /opt/zenithar/data:/data
    healthcheck:
      # The binary checks itself over loopback (distroless has no curl/wget).
      test: ["CMD", "zenithar-backend", "healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    environment:
      RUST_LOG: info
      # HTTP/WebSocket port. Under host networking the `ports:` mapping doesn't
      # apply, so set the port here (ZENITHAR_BIND sets the full host:port).
      ZENITHAR_PORT: "3000"
      # Behind TLS (reverse proxy), mark auth cookies Secure:
      # ZENITHAR_SECURE_COOKIES: "1"
      # STUN for WebRTC ICE (comma-separated). Empty works on a LAN/localhost.
      ZENITHAR_STUN: ""
      # Public IP advertised as the WebRTC host candidate. LEAVE UNSET for a
      # dynamic IP — the server then auto-discovers it from an external echo
      # service and re-checks periodically (picks up a router-reboot change).
      # Set it only to pin a STATIC IP (disables auto-discovery).
      # ZENITHAR_PUBLIC_IP: "203.0.113.10"
      # ZENITHAR_PUBLIC_IP_SERVICE: "http://api.ipify.org"  # echo service (plain HTTP)
      # ZENITHAR_PUBLIC_IP_INTERVAL: "300"                  # re-check seconds (min 10)
      # Media UDP port RANGE — one socket per participant. Forward this whole
      # range in the router. Avoid ports in use (e.g. WireGuard on 50000/50001).
      ZENITHAR_UDP_PORTS: "51000-51200"
      # --- Observability (on by default) ---------------------------------------
      # Export traces (calls, etc.) to the bundled GreptimeDB below. Both services
      # use host networking, so zenithar reaches it at 127.0.0.1:4000. To turn
      # telemetry OFF: comment this line (and optionally remove the greptimedb
      # service). If the endpoint is unreachable, batches are dropped and the app
      # is unaffected.
      ZENITHAR_OTLP_ENDPOINT: "http://127.0.0.1:4000/v1/otlp"
    restart: unless-stopped

  # Metrics/traces store (started by default; remove this service to drop it).
  # Single Rust-native binary (no Prometheus/Grafana/Loki); ingests OTLP locally.
  # Bound to 127.0.0.1 so :4000 is NOT exposed externally — zenithar (host net)
  # reaches it locally for OTLP ingest, and the dashboard is served to admins via
  # the cookie-gated /otel reverse proxy. GreptimeDB has no auth of its own, so
  # keep these on loopback (don't switch to 0.0.0.0 without adding --user-provider).
  greptimedb:
    image: greptime/greptimedb:v1.1.1
    network_mode: host
    command:
      - standalone
      - start
      - --http-addr=127.0.0.1:4000
      - --rpc-bind-addr=127.0.0.1:4001
      - --data-home=/greptimedb_data
    volumes:
      - /opt/zenithar/data/greptimedb:/greptimedb_data
    restart: unless-stopped
