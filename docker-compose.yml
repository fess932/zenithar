services:
  zenithar:
    build: .
    image: ghcr.io/fess932/zenithar:latest
    ports:
      - "3000:3000" # HTTP + WebSocket (chat & call signaling)
    volumes:
      # Local ./data holds the SQLite DB, attachments, call recordings, and the
      # bootstrap admin link. The container runs as root, so it can write here
      # even when the host creates ./data as root — no manual chown needed.
      - ./data:/data
    healthcheck:
      # The binary checks itself over loopback (distroless has no curl/wget).
      test: ["CMD", "zenithar-backend", "healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    environment:
      RUST_LOG: info
      # Behind TLS (reverse proxy), mark auth cookies Secure:
      # ZENITHAR_SECURE_COOKIES: "1"
      # STUN for WebRTC ICE (comma-separated). Empty works on a LAN/localhost.
      # ZENITHAR_STUN: "stun:stun.l.google.com:19302"
    restart: unless-stopped
    # NOTE: real WebRTC *media* is UDP on ephemeral ports — bridged Docker
    # networking won't forward those. On Linux use host networking for live
    # calls (signaling over :3000 works either way; pinning a UDP range is a
    # follow-up). Uncomment and remove `ports:` above:
    # network_mode: host
