services:
  zenithar:
    build: .
    image: ghcr.io/fess932/zenithar:latest
    # --- Networking for voice calls --------------------------------------------
    # Call MEDIA is UDP. Use HOST networking (below) so the app binds the host's
    # real NIC directly. On a multi-homed host (extra podman bridges, WireGuard)
    # ICE would bind media on the wrong interface, so ALSO set ZENITHAR_MEDIA_IP
    # to the LAN IP the router/DMZ forwards to, and ZENITHAR_UDP_PORTS to a fixed
    # range you forward. (Bridged alternative: drop `network_mode: host`, add a
    # `ports:` block publishing "3000:3000" and "<range>:<range>/udp".)
    network_mode: host
    volumes:
      # Local ./data holds the SQLite DB, attachments, call recordings, and the
      # bootstrap admin link. The container runs as root, so it can write here
      # even when the host creates ./data as root — no manual chown needed.
      - ./data:/data
    healthcheck:
      # The binary checks itself over loopback (distroless has no curl/wget).
      test: ["CMD", "zenithar-backend", "healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    environment:
      RUST_LOG: info
      # Behind TLS (reverse proxy), mark auth cookies Secure:
      # ZENITHAR_SECURE_COOKIES: "1"
      # STUN for WebRTC ICE (comma-separated). Empty works on a LAN/localhost.
      ZENITHAR_STUN: ""
      ZENITHAR_PUBLIC_IP: "<external ip>"
      # Fixed media UDP range — forward exactly this in the router (avoid ports
      # already in use, e.g. WireGuard on 50000/50001).
      ZENITHAR_UDP_PORTS: "51000-51200"
      # Multi-homed host: bind media on this LAN IP (the one the DMZ forwards to),
      # not a podman bridge. Match it to your real NIC, e.g. 10.51.0.10.
      ZENITHAR_MEDIA_IP: "<lan ip>"
    restart: unless-stopped
