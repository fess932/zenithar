services:
  zenithar:
    build: .
    image: ghcr.io/fess932/zenithar:latest
    # --- Networking for voice calls --------------------------------------------
    # Call MEDIA is UDP, muxed over ONE fixed port (ZENITHAR_UDP_PORTS) bound to
    # 0.0.0.0. With HOST networking that socket is on the host's real NIC, so the
    # router/DMZ just needs to forward that single UDP port to this host. (Bridged
    # alternative: drop `network_mode: host` and publish it: add a `ports:` block
    # with "3000:3000" and "<port>:<port>/udp".)
    network_mode: host
    volumes:
      # Local ./data holds the SQLite DB, attachments, call recordings, and the
      # bootstrap admin link. The container runs as root, so it can write here
      # even when the host creates ./data as root — no manual chown needed.
      - ./data:/data
    healthcheck:
      # The binary checks itself over loopback (distroless has no curl/wget).
      test: ["CMD", "zenithar-backend", "healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    environment:
      RUST_LOG: info
      # Behind TLS (reverse proxy), mark auth cookies Secure:
      # ZENITHAR_SECURE_COOKIES: "1"
      # STUN for WebRTC ICE (comma-separated). Empty works on a LAN/localhost.
      ZENITHAR_STUN: ""
      ZENITHAR_PUBLIC_IP: "<external ip>"
      # Single media UDP port (mux), forwarded in the router. Avoid ports already
      # in use (e.g. WireGuard on 50000/50001).
      ZENITHAR_UDP_PORTS: "51000"
    restart: unless-stopped
