services:
  zenithar:
    build: .
    image: ghcr.io/fess932/zenithar:latest
    # --- Networking for voice calls --------------------------------------------
    # Call MEDIA is UDP: ONE socket per participant, each bound to 0.0.0.0 on a
    # port from ZENITHAR_UDP_PORTS (so a 1:1 call needs >=2 ports — use a RANGE).
    # With HOST networking those sockets are on the host's real NIC, so the
    # router/DMZ just forwards that whole UDP range to this host. (Bridged
    # alternative: drop `network_mode: host` and publish the range: add a `ports:`
    # block with "3000:3000" and "51000-51200:51000-51200/udp".)
    network_mode: host
    volumes:
      # Local ./data holds the SQLite DB, attachments, call recordings, and the
      # bootstrap admin link. The container runs as root, so it can write here
      # even when the host creates ./data as root — no manual chown needed.
      - ./data:/data
    healthcheck:
      # The binary checks itself over loopback (distroless has no curl/wget).
      test: ["CMD", "zenithar-backend", "healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    environment:
      RUST_LOG: info
      # HTTP/WebSocket port. Under host networking the `ports:` mapping doesn't
      # apply, so set the port here (ZENITHAR_BIND sets the full host:port).
      ZENITHAR_PORT: "3000"
      # Behind TLS (reverse proxy), mark auth cookies Secure:
      # ZENITHAR_SECURE_COOKIES: "1"
      # STUN for WebRTC ICE (comma-separated). Empty works on a LAN/localhost.
      ZENITHAR_STUN: ""
      ZENITHAR_PUBLIC_IP: "<external ip>"
      # Media UDP port RANGE — one socket per participant. Forward this whole
      # range in the router. Avoid ports in use (e.g. WireGuard on 50000/50001).
      ZENITHAR_UDP_PORTS: "51000-51200"
    restart: unless-stopped
